<script>
  Reveal.initialize({
    width: window.innerWidth <= 1180 ? 1080 : window.innerWidth,
    height: window.innerWidth <= 1180 ? 810 : window.innerHeight,
    margin: 0, minScale: 1.0, maxScale: 1.0,
    controls: false, center: false, touch: true, transition: 'none',
    history: true,
    plugins: [ RevealMath.MathJax3 ],
    math: {
      mathjax: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js',
    },
  });

  Reveal.on('ready', function() {
    ['plot1','plot2','plot3','plot4'].forEach(id => {
      Plotly.newPlot(id, [{x:[1,2,3], y:[1,2,3], type:'scatter'}], {autosize:true});
    });
  });

  document.addEventListener('click', function(e) {
    const link = e.target.closest('a[href^="#/"]');
    if (!link) return;
    const id = link.getAttribute('href').slice(2);
    const target = document.querySelector('.slides section[data-id="' + id + '"]');
    if (!target) return;
    e.preventDefault();
    const card = link.classList.contains('hub-card') ? link : null;
    const navigate = () => {
      const indices = Reveal.getIndices(target);
      Reveal.slide(indices.h, indices.v);
    };
    if (card) {
      card.classList.add('zooming');
      setTimeout(navigate, 340);
    } else {
      navigate();
    }
  });
</script>
</body>
</html>
